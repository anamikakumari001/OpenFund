name: Vercel Preview Deploy

# Deploys a Vercel preview environment for every pull request and
# comments the preview URL back on the PR.
on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  preview-deploy:
    name: Vercel Preview Deploy
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.vercel-preview.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deploy credentials
        id: guard
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Preview deploy skipped::VERCEL_TOKEN secret is not set; skipping Vercel preview."
          fi

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Vercel CLI
        if: steps.guard.outputs.enabled == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.guard.outputs.enabled == 'true'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel preview
        if: steps.guard.outputs.enabled == 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Vercel preview
        id: vercel-preview
        if: steps.guard.outputs.enabled == 'true'
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔍 Preview deployment: ${{ steps.vercel-preview.outputs.url }}`
            })
