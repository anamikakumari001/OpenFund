name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  RUST_VERSION: "stable"

jobs:
  # ── Smart contract: test + build WASM ────────────────────────────────────────
  contracts:
    name: Smart Contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts/milestone-escrow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "contracts/milestone-escrow -> target"

      - name: Run contract tests
        run: cargo test
        env:
          RUST_BACKTRACE: 1

      - name: Build WASM artifact
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: milestone-escrow-wasm
          path: contracts/milestone-escrow/target/wasm32-unknown-unknown/release/milestone_escrow.wasm
          retention-days: 14

  # ── Frontend: install → lint → build → test (all four in one job) ────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://test:test@localhost:5432/openfund_test"
      NEXTAUTH_SECRET: "ci-test-secret-not-for-production"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_STELLAR_NETWORK: "testnet"
      NEXT_PUBLIC_ESCROW_CONTRACT_ID: "CCRZRCMEVQUV6WM2IJVWTIDDLHFJAWRVWR4JR3YBWY6JA5E3RREP7QQS"
      NEXT_PUBLIC_CONTRACT_ID: "CCRZRCMEVQUV6WM2IJVWTIDDLHFJAWRVWR4JR3YBWY6JA5E3RREP7QQS"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      GITHUB_CLIENT_ID: "placeholder"
      GITHUB_CLIENT_SECRET: "placeholder"
      ESCROW_CONTRACT_ID: "CCRZRCMEVQUV6WM2IJVWTIDDLHFJAWRVWR4JR3YBWY6JA5E3RREP7QQS"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
