name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  RUST_VERSION: "stable"

jobs:
  # ── Deploy Soroban contract to Stellar testnet ────────────────────────────────
  deploy-contract:
    name: Deploy Contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts/milestone-escrow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deploy credentials
        id: guard
        working-directory: .
        run: |
          if [ -n "${{ secrets.STELLAR_SECRET_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Contract deploy skipped::STELLAR_SECRET_KEY secret is not set; skipping contract deployment."
          fi

      - name: Install Rust toolchain
        if: steps.guard.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        if: steps.guard.outputs.enabled == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "contracts/milestone-escrow -> target"

      - name: Install Stellar CLI
        if: steps.guard.outputs.enabled == 'true'
        run: cargo install --locked stellar-cli

      - name: Build WASM
        if: steps.guard.outputs.enabled == 'true'
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Deploy contract to testnet
        if: steps.guard.outputs.enabled == 'true'
        run: |
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/milestone_escrow.wasm \
            --source ${{ secrets.STELLAR_SECRET_KEY }} \
            --network testnet
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}

  # ── Deploy Next.js frontend to Vercel ────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [deploy-contract]

    env:
      NEXT_PUBLIC_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_CONTRACT_ID }}
      NEXT_PUBLIC_SOROBAN_RPC_URL: ${{ secrets.NEXT_PUBLIC_SOROBAN_RPC_URL }}
      NEXT_PUBLIC_NETWORK_PASSPHRASE: ${{ secrets.NEXT_PUBLIC_NETWORK_PASSPHRASE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deploy credentials
        id: guard
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Frontend deploy skipped::VERCEL_TOKEN secret is not set; skipping Vercel deployment."
          fi

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.guard.outputs.enabled == 'true'
        run: npm ci

      - name: Build
        if: steps.guard.outputs.enabled == 'true'
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          ESCROW_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_CONTRACT_ID }}
          NEXT_PUBLIC_ESCROW_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_CONTRACT_ID }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_STELLAR_NETWORK: "testnet"

      - name: Deploy to Vercel (production)
        if: steps.guard.outputs.enabled == 'true'
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
